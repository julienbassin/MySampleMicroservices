name: Deploy ASP.Net Core app to an Azure Web App

env:
  AZURE_WEBAPP_NAME: MySampleMicroservices
  AZURE_WEBAPP_PACKAGE_PATH: /Play.Catalog/src/Play.Catalog.Service/Play.Catalog.Service.csproj      
  DOTNET_VERSION: '7'   

on:
  push:
    branches: [ "develop", "main" ]
  workflow_dispatch:

permissions:
  contents: read


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@main
      
      - name: Setup .NET Core
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }} 
      
      - name: Build and publish with dotnet
        run: |
          dotnet restore
          dotnet build --configuration Release
          dotnet publish -c Release --property:PublishDir='${{ env.AZURE_WEBAPP_PACKAGE_PATH }}/publish' 
     
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v3
        with:
          name: MySampleMicroserviceapp
          path: ${{env.DOTNET_ROOT}}/publish
     
      - name: Download artifact from build job
        uses: actions/download-artifact@v3
        with:
          name:  MySampleMicroservicesApp
          
      - name: 'Run Azure webapp deploy action using publish profile credentials'
        uses: azure/webapps-deploy@v2
        with: 
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE  }} 
          package: '${{ env.AZURE_WEBAPP_PACKAGE_PATH }}/publish'